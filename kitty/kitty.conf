# ~/.config/kitty/kitty.conf
# Matches your Hyprland setup:
#   - Dark palette from waybar/colors.css fallback
#   - JetBrainsMono Nerd Font (same as rofi/waybar)
#   - Slight transparency (mirrors hyprland.conf kitty-opacity rule: 0.95/0.88)
#   - Matugen colors — update the color block after each wallpaper change,
#     or wire a post_hook to overwrite this file automatically.
#
# Reload without restart: ctrl+shift+f5


# ── FONT ──────────────────────────────────────────────────────────────────────

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        13.0

# Ligatures — set to never if you prefer plain arrows
disable_ligatures never


# ── CURSOR ────────────────────────────────────────────────────────────────────

cursor_shaped beam
cursor_blink_interval  0.5
cursor_stop_blinking_after 10.0


# ── SCROLLBACK ────────────────────────────────────────────────────────────────

scrollback_lines 10000
wheel_scroll_multiplier 3.0


# ── MOUSE ─────────────────────────────────────────────────────────────────────

mouse_hide_wait    3.0
copy_on_select     yes
focus_follows_mouse no


# ── WINDOW ────────────────────────────────────────────────────────────────────
# Kitty handles its own padding; Hyprland adds rounding=12 on top.

remember_window_size      yes
initial_window_width      1000
initial_window_height     650

# Matches decoration.inactive_opacity = 0.93 in hyprland.conf.
# The active/inactive split (0.95/0.88) is handled by the Hyprland windowrule:
#   opacity = 0.95 0.88  — no need to set background_opacity here unless
#   you want kitty to control it independently (e.g. outside Hyprland).
background_opacity        0.95
dynamic_background_opacity yes

# Hide the title bar decorations — Hyprland draws its own borders
hide_window_decorations   yes


# ── TAB BAR ───────────────────────────────────────────────────────────────────

tab_bar_style             powerline
tab_bar_edge              bottom
tab_bar_min_tabs          2
tab_powerline_style       slanted

# Colors match your waybar accent / mantle palette
active_tab_foreground     #cdd6f4
active_tab_background     #252840
inactive_tab_foreground   #565f89
inactive_tab_background   #13151f
tab_bar_background        #0d0f18


# ── COLORS ────────────────────────────────────────────────────────────────────
# Base palette matches your waybar/colors.css fallback + rofi palette.
# Matugen overwrites colors.conf for Hyprland borders — if you want kitty
# to follow wallpaper colors too, add a [templates.kitty] block in
# ~/.config/matugen/config.toml pointing to a kitty colors template.

foreground            #cdd6f4
background            #0d0f18
selection_foreground  #0d0f18
selection_background  #7986cb

# Cursor
cursor                #7986cb
cursor_text_color     #0d0f18

# URL underline color
url_color             #4db6ac

# Black
color0   #1c1f2e
color8   #252840

# Red
color1   #ef5350
color9   #f7768e

# Green
color2   #81c784
color10  #9ece6a

# Yellow
color3   #ffb74d
color11  #e0af68

# Blue  (your main accent)
color4   #7986cb
color12  #7aa2f7

# Magenta
color5   #ce93d8
color13  #bb9af7

# Cyan
color6   #4db6ac
color14  #73daca

# White
color7   #a9b1d6
color15  #cdd6f4


# ── BELL ──────────────────────────────────────────────────────────────────────

enable_audio_bell no
visual_bell_duration 0.0


# ── KEYBOARD SHORTCUTS ────────────────────────────────────────────────────────
# kitty uses ctrl+shift as the default modifier.
# These mirror common patterns from your hyprland keybinds.

# Tabs
map ctrl+shift+t    new_tab_with_cwd
map ctrl+shift+w    close_tab
map ctrl+shift+]    next_tab
map ctrl+shift+[    previous_tab
map ctrl+shift+1    goto_tab 1
map ctrl+shift+2    goto_tab 2
map ctrl+shift+3    goto_tab 3

# Splits (kitty calls them windows)
map ctrl+shift+enter  new_window_with_cwd
map ctrl+shift+x      close_window
map ctrl+shift+right  next_window
map ctrl+shift+left   previous_window

# Font size
map ctrl+equal      change_font_size all +1.0
map ctrl+minus      change_font_size all -1.0
map ctrl+0          change_font_size all 0

# Scrollback
map ctrl+shift+k    scroll_line_up
map ctrl+shift+j    scroll_line_down
map ctrl+shift+u    scroll_page_up
map ctrl+shift+d    scroll_page_down

# Reload config (no restart)
map ctrl+shift+l   load_config_file

# Open kitty config quickly
map ctrl+shift+o   edit_config_file


# ── MISC ──────────────────────────────────────────────────────────────────────

# Shell integration (fish/zsh/bash detected automatically)
shell_integration   enabled

# Clipboard
clipboard_control   write-clipboard write-primary read-clipboard-ask read-primary-ask

# URLs — open with brave (matches $browser in hyprland.conf)
open_url_with       brave

# Allow remote control (useful for scripting kitty from outside)
allow_remote_control yes

# Use a login shell so fish/zsh rc files are sourced
shell               .

/* ~/.config/matugen/templates/hyprland-colors-template.conf        */
/* Auto-generated by matugen on each wallpaper change. Do not edit. */
/* Sourced by hyprland.conf via:  source = ~/.config/hypr/colors.conf */

general {
    col.active_border   = rgba({{colors.primary.default.hex_stripped}}ee) rgba({{colors.tertiary.default.hex_stripped}}ee) 45deg
    col.inactive_border = rgba({{colors.surface_variant.default.hex_stripped}}aa)
}

decoration {
    shadow {
        color = rgba({{colors.shadow.default.hex_stripped}}99)
    }
}

/* ~/.config/matugen/templates/hyprland-colors-template.conf        */
/* Auto-generated by matugen on each wallpaper change. Do not edit. */
/* Sourced by hyprland.conf via:  source = ~/.config/hypr/colors.conf */

$color_primary   = rgb(@{colors.primary.default.hex})
$color_secondary = rgb(@{colors.secondary.default.hex})
$color_tertiary  = rgb(@{colors.tertiary.default.hex})
$color_surface   = rgb(@{colors.surface.default.hex})
$color_error     = rgb(@{colors.error.default.hex})

general {
    col.active_border   = rgba(@{colors.primary.default.hex}ee) rgba(@{colors.tertiary.default.hex}ee) 45deg
    col.inactive_border = rgba(@{colors.surface_variant.default.hex}aa)
}

decoration {
    shadow {
        color = rgba(@{colors.shadow.default.hex}99)
    }
}

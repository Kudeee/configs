################
### MONITORS ###
################

monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = thunar
$menu        = rofi
$browser     = brave


#################
### AUTOSTART ###
#################

exec-once = uwsm app -- gnome-keyring-daemon --start --components=secrets
exec-once = uwsm app -- waybar
exec-once = uwsm app -- swaync
exec-once = ~/.config/hypr/scripts/wallpaper-init.sh

# Dynamic colors — matugen writes ~/.config/hypr/colors.conf after each wallpaper
# change and runs 'hyprctl reload' via post_hook. We cannot source= it here
# because source= is parsed at startup before exec-once runs, causing a
# "globbing error" if the file doesn't exist yet.
# On first boot the fallback col.active_border colors in general{} are used.
# After the first wallpaper pick, hyprctl reload re-applies colors.conf.


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Intel Iris Xe — enable hardware video acceleration
env = LIBVA_DRIVER_NAME,iHD
env = WLR_NO_HARDWARE_CURSORS,0


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 5
    gaps_out = 14

    border_size = 2

    # Fallback colors used on first boot before colors.conf exists.
    # After the first wallpaper pick they are overridden by colors.conf.
    col.active_border   = rgba(7986CBee) rgba(4DB6ACee) 45deg
    col.inactive_border = rgba(37474Faa)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 12
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.93

    shadow {
        enabled      = true
        range        = 18
        render_power = 3
        color        = rgba(00000060)
        offset       = 0 4
    }

    blur {
        enabled           = true
        size              = 6
        passes            = 3
        vibrancy          = 0.18
        vibrancy_darkness = 0.5
        new_optimizations = true
        xray              = false
    }
}

animations {
    enabled = true

    # Curves
    bezier = easeOutExpo,   0.16, 1,    0.3,  1
    bezier = easeOutBack,   0.34, 1.56, 0.64, 1   # springy overshoot on open
    bezier = easeInOutSine, 0.37, 0,    0.63, 1
    bezier = linear,        0,    0,    1,    1
    bezier = quick,         0.15, 0,    0.1,  1

    # Windows — pop open with spring, fade out quickly
    animation = windows,    1, 4,   easeOutBack
    animation = windowsIn,  1, 4,   easeOutBack,   popin 75%
    animation = windowsOut, 1, 2,   easeInOutSine, popin 80%

    # Fades
    animation = fadeIn,  1, 3, easeOutExpo
    animation = fadeOut, 1, 2, easeInOutSine

    # Border — smooth color transitions when matugen reloads colors.conf
    animation = border,      1, 8,  easeOutExpo
    animation = borderangle, 1, 80, linear, loop   # slow gradient rotation

    # Layers (waybar, swaync, rofi)
    animation = layers,        1, 3,   easeOutExpo
    animation = layersIn,      1, 3,   easeOutExpo,  fade
    animation = layersOut,     1, 2,   easeInOutSine, fade
    animation = fadeLayersIn,  1, 2,   easeOutExpo
    animation = fadeLayersOut, 1, 1.5, linear

    # Workspaces — slide + fade
    animation = workspaces,    1, 4, easeOutExpo,   slidefade 20%
    animation = workspacesIn,  1, 4, easeOutExpo,   slidefade 20%
    animation = workspacesOut, 1, 3, easeInOutSine, slidefade 20%
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper      = 0
    disable_hyprland_logo        = true
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
    vfr                          = true   # variable framerate — saves battery
}


#############
### INPUT ###
#############

input {
    kb_layout  = us
    kb_variant =
    kb_model   =
    kb_options =
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0.3

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        drag_lock            = true
        disable_while_typing = true
    }
}

gestures {
  workspace_swipe_distance           = 250
  workspace_swipe_invert             = true
  workspace_swipe_min_speed_to_force = 15
  workspace_swipe_cancel_ratio       = 0.15
  workspace_swipe_create_new         = true

  # New syntax: 3-finger horizontal swipe to switch workspaces
  gesture = 3, horizontal, workspace
}

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod,       RETURN, exec, $terminal
bind = $mainMod,       B,      exec, $browser
bind = $mainMod,       W,      killactive,
bind = $mainMod,       M,      exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       V,      togglefloating,
bind = $mainMod,       R,      exec, $menu -show drun || pkill -x rofi
bind = $mainMod,       P,      pseudo,
bind = $mainMod,       J,      layoutmsg, togglesplit
bind = $mainMod,       F,      fullscreen, 0
bind = $mainMod SHIFT, F,      fullscreen, 1

# Wallpaper picker (Super+K)
bind = $mainMod, K, exec, ~/.config/hypr/scripts/wallpaper.sh

# Screenshots
bind = ,             Print, exec, grim -g "$(slurp)" - | satty --filename -
bind = $mainMod,     Print, exec, grim - | satty --filename -
bind = $mainMod CTRL,Print, exec, grim -g "$(slurp)" ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot saved"

# Reload waybar
bind = $mainMod, L, exec, pkill waybar && waybar &

# Focus movement
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Resize windows with keyboard
bind = $mainMod CTRL, left,  resizeactive, -40 0
bind = $mainMod CTRL, right, resizeactive,  40 0
bind = $mainMod CTRL, up,    resizeactive,  0 -40
bind = $mainMod CTRL, down,  resizeactive,  0  40

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media keys
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name  = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name  = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus = true
}

windowrule {
    name  = move-hyprland-run
    match:class = hyprland-run
    move  = 20 monitor_h-120
    float = yes
}

# Float common utility apps
windowrule {
    name  = float-utilities
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|lxappearance|qt5ct|nwg-look)$
    float  = yes
    size   = 800 600
    center = yes
}

# Float file picker dialogs
windowrule {
    name  = float-file-dialogs
    match:title = ^(Open|Save|Save As|File Chooser).*$
    float  = yes
    center = yes
}

# Picture-in-picture — float, pin, stick to bottom-right corner
windowrule {
    name  = pip
    match:title = ^(Picture-in-Picture)$
    float = yes
    pin   = no
    size  = 480 270
    move            = 100%-490 100%-280
}

# Terminal gets slight transparency for depth
windowrule {
    name  = kitty-opacity
    match:class = ^(kitty)$
    opacity = 0.95 0.88
}
